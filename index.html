<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotten Blood Tools - Final</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('totem')">Radicular Totem</button>
        <button class="tab-btn" onclick="switchTab('boss')">Boss - 1MIN30</button>
        <!-- Novo Botão Adicionado -->
        <button class="tab-btn" onclick="switchTab('check')">Check Rare</button> 
    </div>

    <div id="tab-totem" class="tab-content active">
        <!-- ... (Código original do Totem mantido) ... -->
    </div>

    <div id="tab-boss" class="tab-content">
        <!-- ... (Código original do Boss mantido) ... -->
    </div>

    <!-- NOVA ABA: CHECK RARE -->
    <div id="tab-check" class="tab-content">
        <h1>Boss Checker</h1>
        <p>Aviso a cada 10 minutos a partir do horário base.</p>

        <div class="controls" style="margin-top: 0;">
            <input type="time" id="base-time" class="time-input" required>
            <button class="btn-start" onclick="startRareCheck()">Iniciar</button>
            <button class="btn-stop" onclick="stopRareCheck()">Parar</button>
        </div>

        <div class="next-check-display">
            Próximo Check: <span id="next-check-time">--:--</span>
        </div>

        <div class="schedule-list" id="schedule-list">
            <!-- Lista de horários gerada via JS -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
